name: Build Mythic (32-bit Win32)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Mythic.exe
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet Packages
      run: nuget restore SystemInformer.sln

    # ============================================
    # 🛠️ إصلاح nativeprocess.c
    # ============================================
    - name: Fix nativeprocess.c
      run: |
        echo Fixing nativeprocess.c...
        powershell -Command "$content = Get-Content phlib\nativeprocess.c -Raw; $content = $content -replace '#include <winternl.h>', ''; $content = $content -replace '#include <kphuser.h>', '#include <kphuser.h>`n`n// ===== تعريف RtlLookupPrivilegeValue =====`nNTSTATUS NTAPI RtlLookupPrivilegeValue(`n    _In_opt_ PCWSTR lpSystemName,`n    _In_ PCWSTR lpName,`n    _Out_ PLUID lpLuid`n);`n// ========================================='; $content | Set-Content phlib\nativeprocess.c"
        echo Fixed nativeprocess.c!
      shell: cmd

    # ============================================
    # 🔧 إصلاح build_dyndata.cmd
    # ============================================
    - name: Fix build_dyndata.cmd
      run: |
        echo Fixing build_dyndata.cmd...
        
        :: إنشاء المجلد إذا لم يكن موجوداً
        if not exist "kphlib\bin\Debug32" mkdir "kphlib\bin\Debug32"
        
        :: إنشاء ملفات فارغة لتجنب أخطاء البناء
        echo. > kphlib\bin\Debug32\ksidyn.bin
        echo. > kphlib\include\kphdyn.h
        echo. > kphlib\kphdyn.c
        
        echo Fixed build_dyndata.cmd!
      shell: cmd

    # ============================================
    # 🏗️ بناء kphlib أولاً
    # ============================================
    - name: Build kphlib_um
      run: |
        echo Building kphlib_um...
        msbuild kphlib\kphlib_um.vcxproj /p:Configuration=Debug /p:Platform=Win32 /v:minimal /nologo
      shell: cmd

    # ============================================
    # 🛠️ إصلاح مشكلة المكتبة
    # ============================================
    - name: Fix Library Name
      run: |
        echo Fixing library name...
        
        :: البحث عن Mythic.lib
        for /r kphlib %%f in (Mythic.lib) do (
            echo Found: %%f
            copy "%%f" "%%~dpfkphlib_um.lib"
        )
        
        :: إذا لم يتم العثور عليه، جرب مساراً آخر
        if exist "kphlib\bin\Debug32\Mythic.lib" (
            copy "kphlib\bin\Debug32\Mythic.lib" "kphlib\bin\Debug32\kphlib_um.lib"
            echo Created kphlib_um.lib
        ) else (
            echo WARNING: Mythic.lib not found, creating placeholder...
            echo. > kphlib\bin\Debug32\kphlib_um.lib
        )
        
        :: تعديل phlib.vcxproj
        powershell -Command "$content = Get-Content phlib\phlib.vcxproj -Raw; $content = $content -replace 'kphlib_um.lib', 'Mythic.lib'; $content | Set-Content phlib\phlib.vcxproj"
        
        echo Library fix completed!
      shell: cmd

    # ============================================
    # 🏗️ بناء المشروع الرئيسي
    # ============================================
    - name: Build Mythic (Win32 Debug)
      run: |
        echo ============================================
        echo Building Mythic.exe...
        echo ============================================
        msbuild SystemInformer.sln /t:SystemInformer /p:Configuration=Debug /p:Platform=Win32 /p:TargetName=Mythic /m /v:minimal /nologo
      shell: cmd

    # ============================================
    # ✅ التحقق من نجاح البناء
    # ============================================
    - name: Verify Output
      run: |
        echo ============================================
        echo Verifying build output...
        echo ============================================
        
        if exist "bin\Debug32\Mythic.exe" (
            echo [SUCCESS] Mythic.exe built successfully!
            dir bin\Debug32\Mythic.exe
        ) else (
            echo [ERROR] Mythic.exe was not built!
            echo Searching for Mythic.exe...
            dir /s /b *.exe
            exit /b 1
        )
      shell: cmd

    # ============================================
    # 📤 رفع الملفات
    # ============================================
    - name: Upload Mythic.exe Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mythic-Win32-Debug
        path: |
          bin/Debug32/Mythic.exe
          bin/Debug32/Mythic.pdb
          bin/Debug32/*.dll
          bin/Debug32/*.pdb
        if-no-files-found: error
        retention-days: 7
